listen: :HYSTERIA_PORT_PLACEHOLDER

# Серт берём от Caddy через симлинк — при смене домена путь сам перенаправится
# (ExecStartPre юнита вызывает update-cert-symlinks.sh)
tls:
  cert: /etc/hysteria/cert.crt
  key: /etc/hysteria/cert.key

auth:
  type: userpass
  userpass: {}

obfs:
  type: salamander
  salamander:
    password: HYSTERIA_OBFS_PASSWORD_PLACEHOLDER

masquerade:
  type: proxy
  proxy:
    url: https://news.ycombinator.com/
    rewriteHost: true

quic:
  initStreamReceiveWindow: 16777216
  maxStreamReceiveWindow: 16777216
  initConnReceiveWindow: 41943040
  maxConnReceiveWindow: 41943040
